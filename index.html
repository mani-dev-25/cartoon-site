<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamil Cartoon Streaming</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* SEARCH */

#search{
width:300px;
padding:10px;
margin-top:10px;
background:#222;
border:none;
color:white;
}
.notice{
background:#ff4444;
color:white;
text-align:center;
padding:12px;
font-size:15px;
font-weight:bold;
}
/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:25px;
}

/* VIDEO CARD */

.card{
background:#1c1c1c;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* VIDEO */

iframe{
width:100%;
height:220px;
border-radius:6px;
}

video{
width:100%;
height:220px;
border-radius:6px;
}

/* TITLE */

.card h3{
margin:10px 0 0 0;
font-size:16px;
}

</style>
</head>

<body>

<header>

Tamil Cartoon Streaming

<br>



</header>

<div class="notice">
⚠️ Note: Please watch the cartoons only on this website. Do not open the video on YouTube to avoid advertisements and interruptions.
</div>


<div class="grid" id="grid">

<!-- VIDEO 1 -->

<div class="card" data-title="Jackie Chan Episode 1">

<iframe
src="https://www.youtube.com/embed/dOPXce99A2w?rel=0&modestbranding=1&controls=1&disablekb=1"
frameborder="0"
allowfullscreen>
</iframe>

<h3>oggy and the cockroaches movie</h3>

</div>

<!--video 2-->
<div class="card" data-title="Jackie Chan Episode 2">

<video controls width="100%" poster="thumbnail.jpg">
  <source src="https://archive.org/download/vid-20260306-wa-0000/VID-20260306-WA0000.mp4" type="video/mp4">
</video>



<h3>mr bean video</h3>

</div>
</div>



</body>
</html>
