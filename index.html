<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamil Cartoon World</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* SEARCH */

#search{
width:300px;
padding:10px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* CARD */

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
}

/* VIDEO PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.player iframe{
width:80%;
height:60%;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

Tamil Cartoon World

<br>

<input id="search" placeholder="Search cartoon...">

</header>


<div class="grid" id="grid">

<!-- VIDEO CARD 1 -->

<div class="card"
data-title="oggy movie 1"
data-video="https://www.youtube.com/embed/dOPXce99A2w">

<img src="https://i.imgur.com/9XnK6Fh.jpg">

<h3>oggy movie 1</h3>

</div>


<!-- VIDEO CARD 2 -->

<div class="card"
data-title="vijay raj"
data-video="https://www.youtube.com/embed/VdzyYQ7I0mc">

<img src="https://i.imgur.com/9XnK6Fh.jpg">

<h3>Jackie Chan Adventures Episode 2</h3>

</div>


<!-- VIDEO PLAYER -->

<div class="player" id="player">

<div class="close" onclick="closePlayer()">✖</div>

<iframe id="video" frameborder="0" allowfullscreen></iframe>

</div>


<script>

const cards = document.querySelectorAll(".card")
const player = document.getElementById("player")
const video = document.getElementById("video")

cards.forEach(card => {

card.addEventListener("click",()=>{

let link = card.getAttribute("data-video")

video.src = link

player.style.display="flex"

})

})


function closePlayer(){

video.src=""

player.style.display="none"

}



/* SEARCH FUNCTION */

document.getElementById("search").addEventListener("keyup",function(){

let value = this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

let title = card.getAttribute("data-title").toLowerCase()

card.style.display = title.includes(value) ? "block":"none"

})

})

</script>

</body>
</html>
