```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamil Cartoon Streaming</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* SEARCH */

#search{
width:300px;
padding:10px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:25px;
}

/* VIDEO CARD */

.card{
background:#1c1c1c;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* VIDEO */

iframe{
width:100%;
height:220px;
border-radius:6px;
}

/* TITLE */

.card h3{
margin:10px 0 0 0;
font-size:16px;
}

</style>
</head>

<body>

<header>

Tamil Cartoon Streaming

<br>

<input id="search" placeholder="Search cartoon...">

</header>


<div class="grid" id="grid">

<!-- VIDEO 1 -->

<div class="card" data-title="Jackie Chan Episode 1">

<iframe
src="https://www.youtube.com/embed/dOPXce99A2w"
frameborder="0"
allowfullscreen>
</iframe>

<h3>oggy and the cockroaches movie</h3>

</div>


<!-- VIDEO 2 -->

<div class="card" data-title="Jackie Chan Episode 2">

<iframe
src="https://www.youtube.com/embed/VdzyYQ7I0mc"
frameborder="0"
allowfullscreen>
</iframe>

<h3>vijayraj sir video</h3>

</div>




</div>


<script>

/* SEARCH FUNCTION */

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

let title=card.dataset.title.toLowerCase()

card.style.display=title.includes(value)?"block":"none"

})

})

</script>

</body>
</html>
```
