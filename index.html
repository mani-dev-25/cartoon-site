<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamil Cartoon Streaming</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* NOTICE */

.notice{
background:#ff4444;
color:white;
text-align:center;
padding:12px;
font-size:15px;
font-weight:bold;
}

/* SEARCH */

#search{
width:300px;
padding:10px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:25px;
}

/* CARD */

.card{
background:#1c1c1c;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* VIDEO */

video{
width:100%;
height:220px;
border-radius:6px;
}

/* TITLE */

.card h3{
margin:10px 0 0 0;
font-size:16px;
}

</style>
</head>

<body>

<header>
Tamil Cartoon Streaming
</header>

<div class="notice">
⚠️ Watch only on this website.
</div>

<div class="grid" id="grid"></div>

<script>

// 🔥 ADD YOUR VIDEOS HERE
const videos = [

{
title: "Oggy and the Cockroaches Movie",
src: "https://archive.org/download/oggy-and-the-cockroaches-the-movie-2013-original-1080p-hd/Oggy%20and%20the%20Cockroaches%20The%20Movie%202013%20Original%201080p%20HD.mp4"
},

{
title: "Tom and Jerry Live Action",
src: "https://archive.org/download/tom-and-jerry-tamil-2021-hd/Tom%20And%20Jerry%20Tamil%202021%20HD.mp4"
}

];

// Get grid
const grid = document.getElementById("grid");

// Create cards automatically
videos.forEach(video => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<video controls>
<source src="${video.src}" type="video/mp4">
Your browser does not support video.
</video>
<h3>${video.title}</h3>
`;

grid.appendChild(card);

});

</script>

</body>
</html>
